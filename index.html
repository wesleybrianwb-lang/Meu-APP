<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestTrack Cloud Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa; --surface-color: #ffffff;
            --text-main: #202124; --text-muted: #5f6368;
            --primary: #1a73e8; --primary-hover: #1557b0;
            --border: #dadce0; --danger: #d93025;
            --success: #188038; --warning: #f4b400;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); }
        #app { display: flex; flex-direction: column; min-height: 100vh; }
        
        /* HEADER E STATUS NUVEM */
        header { background-color: var(--surface-color); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 100; }
        .header-title { font-size: 1.2rem; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .cloud-status { font-size: 0.8rem; font-weight: normal; padding: 4px 8px; border-radius: 12px; background: #e8f0fe; color: var(--primary); }
        .cloud-status.saving { background: #fef7e0; color: #b06000; }

        /* BOTOES GERAIS */
        .btn { background-color: var(--surface-color); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; color: var(--text-main); }
        .btn:hover { background-color: #f1f3f4; border-color: #c1c3c5; }
        .btn-primary { background-color: var(--primary); color: white; border: none; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { color: var(--danger); border-color: var(--border); }
        .btn-danger:hover { background-color: #fce8e6; border-color: var(--danger); }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; }

        /* TELAS DE AVISO E LOGIN */
        .auth-screen { flex: 1; display: flex; justify-content: center; align-items: center; background-color: var(--bg-color); }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        
        /* LAYOUT PRINCIPAL */
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background-color: var(--surface-color); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; background-color: #fdfdfd; }
        .section-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin: 20px 0 10px 0; letter-spacing: 0.5px; }

        /* LISTAS E CARDS */
        .list-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .list-item:hover { background-color: #f1f3f4; }
        .list-item.active { background-color: #e8f0fe; color: var(--primary); font-weight: 500; }
        .list-item input { border: 1px solid var(--primary); border-radius: 4px; padding: 2px 5px; font-size: 0.9rem; width: 80%; }
        
        .category-header { background-color: #f8f9fa; font-weight: 600; font-size: 0.85rem; border-left: 3px solid var(--primary); border-radius: 0 6px 6px 0; margin-top: 10px;}
        .investment-item { padding-left: 15px; font-size: 0.85rem; border-left: 1px dashed var(--border); margin-left: 10px; border-radius: 0 6px 6px 0;}

        .card { background: var(--surface-color); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; position: relative; }
        .summary-card { background-color: #e8f0fe; border: 1px solid var(--primary); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-checkbox { position: absolute; top: 15px; right: 15px; width: 18px; height: 18px; cursor: pointer; }

        /* FORMULARIOS E TABELAS */
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        input[type="text"], input[type="number"], select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; background-color: white; font-family: inherit; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { color: var(--text-muted); font-weight: 600; background-color: #f8f9fa; }

        /* UTILITÁRIOS */
        .text-success { color: var(--success); font-weight: 600;}
        .text-danger { color: var(--danger); font-weight: 600;}
        .chart-container { height: 450px; width: 100%; margin-top: 20px; }
        .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .badge-info { background: #e8f0fe; color: var(--primary); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-usd { background: #e6f4ea; color: var(--success); }
        .delete-btn { opacity: 0; transition: opacity 0.2s; color: var(--text-muted); font-size: 1rem; padding: 0 2px;}
        .list-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--danger); }
        
        .toggle-icon { display: inline-block; width: 20px; font-size: 0.7rem; color: var(--primary); }

        [v-cloak] { display: none; }

        footer.error-log { background-color: #323232; color: #ff8a80; padding: 12px 20px; font-size: 0.85rem; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    
    <div class="auth-screen" v-if="!isFirebaseConfigured">
        <div class="auth-card" style="max-width: 600px; border: 2px solid var(--danger);">
            <h2 style="color: var(--danger); margin-top: 0;">⚠️ Firebase Não Configurado</h2>
            <p>Verifique o código-fonte.</p>
        </div>
    </div>

    <div class="auth-screen" v-else-if="isFirebaseConfigured && !user && !isCheckingAuth">
        <div class="auth-card">
            <h2 style="color: var(--primary); margin-top: 0;">📊 InvestTrack Cloud</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Sincronização em nuvem ativa</p>
            
            <form @submit.prevent="handleAuth">
                <input type="email" class="auth-input" v-model="authEmail" placeholder="Seu e-mail" required>
                <input type="password" class="auth-input" v-model="authPassword" placeholder="Sua senha" required minlength="6">
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; font-size: 1rem;">
                    {{ isLoginMode ? 'Entrar' : 'Criar Conta' }}
                </button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.9rem;">
                <span style="color: var(--text-muted);">{{ isLoginMode ? 'Não tem uma conta?' : 'Já tem uma conta?' }}</span>
                <a href="#" @click.prevent="isLoginMode = !isLoginMode" style="color: var(--primary); text-decoration: none; font-weight: bold;">
                    {{ isLoginMode ? 'Registre-se' : 'Faça login' }}
                </a>
            </p>
        </div>
    </div>

    <template v-else-if="user">
        <header>
            <div class="header-title">
                📊 InvestTrack Pro
                <span class="cloud-status" :class="{saving: syncStatus.includes('Salvando')}">
                    {{ syncStatus }}
                </span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span style="font-size: 0.85rem; color: var(--text-muted); margin-right: 10px;">👤 {{ user.email }}</span>
                <button class="btn btn-danger" @click="logout">Sair da Conta</button>
            </div>
        </header>

        <div class="container">
            <div class="sidebar">
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 20px;" @click="createNewYear">
                    + Novo Calendário Anual
                </button>

                <div v-if="appData.years.length > 0">
                    <div class="section-title">Calendários</div>
                    <div v-for="(yearData, yIndex) in appData.years" :key="yIndex" 
                         class="list-item" :class="{active: currentYearIndex === yIndex}"
                         @click="selectYear(yIndex)">
                        
                        <span v-if="editingYearIndex !== yIndex">{{ yearData.year }}</span>
                        <input v-else v-model="yearData.year" @blur="editingYearIndex = -1" @keyup.enter="editingYearIndex = -1" autofocus @click.stop>
                        
                        <div style="display: flex; gap: 5px;">
                            <span class="delete-btn" @click.stop="editingYearIndex = yIndex" title="Editar ano">✏️</span>
                            <span class="delete-btn" @click.stop="deleteYear(yIndex)" title="Excluir calendário">🗑️</span>
                        </div>
                    </div>

                    <div v-if="currentYear">
                        <hr style="border:0; border-top: 1px solid var(--border); margin: 20px 0;">
                        
                        <div class="list-item" :class="{active: currentView === 'overview'}" @click="currentView = 'overview'">
                            📑 Visão Geral
                        </div>
                        <div class="list-item" :class="{active: currentView === 'chart'}" @click="openChart()">
                            📈 Gráfico Comparativo
                        </div>

                        <div class="section-title" style="margin-top: 25px;">Tipos de Investimento</div>
                        <button class="btn" style="width: 100%; margin-bottom: 10px; justify-content: center; background: #f8f9fa;" @click="createNewCategory">
                            + Nova Categoria
                        </button>

                        <div v-for="(cat, cIndex) in currentYear.categories" :key="'cat-'+cIndex" style="margin-bottom: 5px;">
                            <div class="list-item category-header" @click="cat.isExpanded = !cat.isExpanded" style="user-select: none;">
                                <div>
                                    <span class="toggle-icon">{{ cat.isExpanded ? '▼' : '▶' }}</span>
                                    <span v-if="editingCategoryIndex !== cIndex" style="text-transform: uppercase; letter-spacing: 0.5px;">{{ cat.name }}</span>
                                    <input v-else v-model="cat.name" @blur="editingCategoryIndex = -1" @keyup.enter="editingCategoryIndex = -1" @click.stop autofocus>
                                </div>
                                
                                <div style="display: flex; gap: 5px;">
                                    <span class="delete-btn" @click.stop="createNewInvestment(cIndex)" title="Adicionar Ativo nesta categoria">➕</span>
                                    <span class="delete-btn" @click.stop="editingCategoryIndex = cIndex" title="Renomear Categoria">✏️</span>
                                    <span class="delete-btn" @click.stop="deleteCategory(cIndex)" title="Excluir Categoria">🗑️</span>
                                </div>
                            </div>
                            
                            <div v-show="cat.isExpanded">
                                <div v-if="cat.investments.length > 0">
                                    <div v-for="(inv, iIndex) in cat.investments" :key="'inv-'+iIndex"
                                         class="list-item investment-item" 
                                         :class="{active: currentView === 'investment' && currentCategoryIndex === cIndex && currentInvestmentIndex === iIndex}"
                                         @click="selectInvestment(cIndex, iIndex)">
                                        <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;">
                                            ↳ {{ inv.name || 'Sem Nome' }}
                                        </span>
                                        <span class="delete-btn" @click.stop="deleteInvestment(cIndex, iIndex)" title="Excluir ativo">🗑️</span>
                                    </div>
                                </div>
                                <div v-else style="padding: 5px 15px; font-size: 0.75rem; color: #9aa0a6; font-style: italic; border-left: 1px dashed var(--border); margin-left: 10px;">
                                    Nenhum ativo cadastrado.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div v-if="appData.years.length === 0" style="text-align: center; margin-top: 100px; color: var(--text-muted);">
                    <div style="font-size: 4rem;">☁️</div>
                    <h2>Tudo pronto e seguro na nuvem!</h2>
                    <p>Para começar, crie um novo calendário anual no menu lateral.</p>
                </div>

                <div v-if="currentView === 'overview' && currentYear">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <h2 style="margin: 0;">Resumo de {{ currentYear.year }}</h2>
                    </div>

                    <div v-if="selectedForAnalysis.length > 0" class="summary-card" style="display: flex; flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 15px;">
                            <h3 style="margin: 0; color: var(--primary);">Balanço dos Selecionados ({{ selectedForAnalysis.length }})</h3>
                            <button class="btn btn-primary" @click="analyzeSelected" style="padding: 8px 16px;">📈 Gerar Gráfico</button>
                        </div>
                        
                        <div style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
                            <template v-for="(data, curr) in selectedAggregate" :key="curr">
                                <div v-if="data.hasData" style="background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                                    <div style="font-weight: bold; margin-bottom: 10px; color: var(--text-muted); font-size: 0.85rem;">Moeda: {{ curr === 'USD' ? 'Dólar Americano (USD)' : 'Real Brasileiro (BRL)' }}</div>
                                    <div style="display: flex; gap: 30px; font-size: 1.05rem; flex-wrap: wrap;">
                                        <div><span style="color: var(--text-muted); font-size: 0.9rem; display: block;">Total Investido</span><strong>{{ formatCurrency(data.invested, curr) }}</strong></div>
                                        <div><span style="color: var(--text-muted); font-size: 0.9rem; display: block;">Soma do Último Saldo</span><strong>{{ formatCurrency(data.balance, curr) }}</strong></div>
                                        <div>
                                            <span style="color: var(--text-muted); font-size: 0.9rem; display: block;">Lucro / Prejuízo Combinado</span>
                                            <strong :class="getProfitClass(data.profit)">
                                                {{ formatCurrency(data.profit, curr) }} 
                                                <span v-if="data.invested > 0" style="font-size: 0.9rem;">({{ ((data.profit / data.invested) * 100).toFixed(2) }}%)</span>
                                            </strong>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div v-for="(cat, cIdx) in currentYear.categories" :key="'overview-cat-'+cIdx">
                        <div v-if="cat.investments.length > 0">
                            <h3 @click="cat.isExpanded = !cat.isExpanded" style="cursor: pointer; user-select: none; margin-top: 10px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid var(--border); color: var(--text-muted); text-transform: uppercase; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                                <span class="toggle-icon">{{ cat.isExpanded ? '▼' : '▶' }}</span>
                                {{ cat.name }}
                            </h3>
                            
                            <div class="overview-grid" v-show="cat.isExpanded">
                                <div class="card" v-for="(inv, iIdx) in cat.investments" :key="inv.id">
                                    <input type="checkbox" class="card-checkbox" :value="cIdx + '-' + iIdx" v-model="selectedForAnalysis">
                                    <div style="margin-right: 30px;">
                                        <h3 style="margin: 0 0 10px 0; font-size: 1.1rem; color: var(--primary);">{{ inv.name || 'Sem Nome' }}</h3>
                                        <div class="badge-info" :class="{'badge-usd': inv.currency === 'USD'}" style="margin-bottom: 15px; display: inline-block;">
                                            Inicial: {{ formatCurrency(inv.initial, inv.currency) }}
                                        </div>
                                        
                                        <div v-if="getLastRecordedMonthIndex(inv) !== -1">
                                            <p style="margin: 8px 0; font-size: 0.9rem;"><strong>Total Investido:</strong><br>{{ formatCurrency(calcTotalInvested(inv, getLastRecordedMonthIndex(inv)), inv.currency) }}</p>
                                            <p style="margin: 8px 0; font-size: 0.9rem;"><strong>Último Saldo:</strong><br>{{ formatCurrency(inv.months[getLastRecordedMonthIndex(inv)].balance, inv.currency) }} <small>({{ monthNames[getLastRecordedMonthIndex(inv)] }})</small></p>
                                            <p style="margin: 8px 0; font-size: 0.9rem;"><strong>Resultado:</strong><br><span :class="getProfitClass(calcProfit(inv, getLastRecordedMonthIndex(inv)))">{{ formatCurrency(calcProfit(inv, getLastRecordedMonthIndex(inv)), inv.currency) }} ({{ calcProfitPercent(inv, getLastRecordedMonthIndex(inv)).toFixed(2) }}%)</span></p>
                                        </div>
                                        <div v-else style="color: var(--text-muted); font-size: 0.85rem; padding: 10px 0;"><em>Nenhum saldo registrado.</em></div>
                                        <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; display: flex; gap: 8px;">
                                            <button class="btn btn-sm" @click="selectInvestment(cIdx, iIdx)">✏️ Editar</button>
                                            <button class="btn btn-sm" @click="openChart([cIdx + '-' + iIdx])">📈 Analisar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div v-if="currentYear.categories.length === 0" style="text-align: center; padding: 40px; color: var(--text-muted);">
                        Crie uma categoria e adicione ativos para ver o resumo.
                    </div>
                </div>

                <div v-if="currentView === 'investment' && currentInvestment">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <h2 style="margin-top:0">Configuração do Ativo</h2>
                            <button class="btn btn-danger btn-sm" @click="clearCurrentInvestmentData">🧹 Limpar Dados</button>
                        </div>
                        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px;">
                            <div class="input-group" style="flex: 2; min-width: 200px;"><label>Nome do Ativo / Investimento</label><input type="text" v-model="currentInvestment.name"></div>
                            <div class="input-group" style="flex: 1; min-width: 150px;"><label>Moeda</label><select v-model="currentInvestment.currency"><option value="BRL">Real (BRL)</option><option value="USD">Dólar (USD)</option></select></div>
                            <div class="input-group" style="flex: 1; min-width: 200px;"><label>Inicial Anual ({{ getCurrencySymbol(currentInvestment.currency) }})</label><input type="number" v-model.number="currentInvestment.initial" step="0.01"></div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Lançamentos Mensais</h3>
                        <div style="overflow-x: auto;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Mês</th><th>Aporte ({{ getCurrencySymbol(currentInvestment.currency) }})</th><th>Saldo Bruto ({{ getCurrencySymbol(currentInvestment.currency) }})</th><th>Total Investido</th><th>Lucro/Prejuízo</th><th>Rentabilidade</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(monthData, mIndex) in currentInvestment.months" :key="mIndex">
                                        <td><strong>{{ monthNames[mIndex] }}</strong></td>
                                        <td><input type="number" v-model.number="monthData.contribution" step="0.01" placeholder="0.00"></td>
                                        <td><input type="number" v-model.number="monthData.balance" step="0.01" placeholder="0.00"></td>
                                        <td style="color: #666">{{ formatCurrency(calcTotalInvested(currentInvestment, mIndex), currentInvestment.currency) }}</td>
                                        <td :class="getProfitClass(calcProfit(currentInvestment, mIndex))">{{ calcProfit(currentInvestment, mIndex) !== null ? formatCurrency(calcProfit(currentInvestment, mIndex), currentInvestment.currency) : '---' }}</td>
                                        <td :class="getProfitClass(calcProfitPercent(currentInvestment, mIndex))">{{ calcProfitPercent(currentInvestment, mIndex) !== null ? calcProfitPercent(currentInvestment, mIndex).toFixed(2) + '%' : '---' }}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div v-if="currentView === 'chart' && currentYear">
                    <div class="card">
                        <h2>Análise Comparativa de Saldo</h2>
                        <div style="margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            
                            <div v-for="(cat, cIdx) in currentYear.categories" :key="'chart-cat-'+cIdx" style="margin-bottom: 15px;">
                                <div v-if="cat.investments.length > 0">
                                    <div style="font-weight: bold; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;">{{ cat.name }}</div>
                                    <div style="display: flex; flex-wrap: wrap; gap: 15px;">
                                        <div v-for="(inv, iIdx) in cat.investments" :key="'chart-inv-'+iIdx" style="display: flex; align-items: center; gap: 5px; font-size: 0.85rem;">
                                            <input type="checkbox" :id="'chk-'+cIdx+'-'+iIdx" v-model="selectedChartInvestments" :value="cIdx + '-' + iIdx" @change="renderChart">
                                            <label :for="'chk-'+cIdx+'-'+iIdx" style="cursor:pointer">{{ inv.name || 'Sem Nome' }}</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div v-if="currentYear.categories.length === 0" style="color: var(--text-muted); font-size: 0.9rem;">
                                Nenhum investimento cadastrado para análise.
                            </div>

                        </div>
                        <div class="chart-container"><canvas id="investmentChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <footer class="error-log" v-if="errorMessage">
        <span><strong>LOG DE ERRO:</strong> {{ errorMessage }}</span>
        <button style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;" @click="errorMessage = ''">×</button>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Suas chaves de configuração:
    const firebaseConfig = {
        apiKey: "AIzaSyBgVOm9OhfbtLUgMCJ9ZGQWvPNQenKrHG8",
        authDomain: "investtrack-a0e90.firebaseapp.com",
        projectId: "investtrack-a0e90",
        storageBucket: "investtrack-a0e90.firebasestorage.app",
        messagingSenderId: "761052033034",
        appId: "1:761052033034:web:9c3a569ae884b73cb1aff3"
    };

    const isConfigured = firebaseConfig.apiKey !== "COLE_AQUI";
    
    let app, db, auth;
    if (isConfigured) {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
    }

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                isFirebaseConfigured: isConfigured,
                isCheckingAuth: true,
                user: null,
                isLoginMode: true,
                authEmail: '',
                authPassword: '',
                syncStatus: '☁️ Sincronizado',
                saveTimeout: null,
                isDataLoaded: false, 

                appData: { years: [] },
                currentYearIndex: 0,
                currentCategoryIndex: -1,
                currentInvestmentIndex: -1,
                editingYearIndex: -1,
                editingCategoryIndex: -1,
                currentView: 'overview',
                monthNames: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
                errorMessage: '',
                chartInstance: null,
                selectedChartInvestments: [], 
                selectedForAnalysis: [] 
            }
        },
        computed: {
            currentYear() { return this.appData.years[this.currentYearIndex] || null; },
            currentInvestment() {
                if(this.currentYear && this.currentCategoryIndex >= 0 && this.currentInvestmentIndex >= 0) {
                    const cat = this.currentYear.categories[this.currentCategoryIndex];
                    if (cat && cat.investments) return cat.investments[this.currentInvestmentIndex];
                }
                return null;
            },
            selectedAggregate() {
                let totals = { BRL: { balance: 0, profit: 0, invested: 0, hasData: false }, USD: { balance: 0, profit: 0, invested: 0, hasData: false } };
                if (!this.currentYear || this.selectedForAnalysis.length === 0) return totals;

                for (let val of this.selectedForAnalysis) {
                    const [cIdx, iIdx] = val.split('-');
                    const cat = this.currentYear.categories[cIdx];
                    if (!cat) continue;
                    const inv = cat.investments[iIdx];
                    if (!inv) continue;
                    
                    const c = inv.currency || 'BRL';
                    const lastIdx = this.getLastRecordedMonthIndex(inv);
                    if (lastIdx !== -1) {
                        totals[c].hasData = true;
                        totals[c].balance += Number(inv.months[lastIdx].balance) || 0;
                        totals[c].profit += this.calcProfit(inv, lastIdx) || 0;
                        totals[c].invested += this.calcTotalInvested(inv, lastIdx) || 0;
                    }
                }
                return totals;
            }
        },
        watch: {
            appData: {
                deep: true,
                handler() {
                    if (this.isDataLoaded && this.user) {
                        this.syncStatus = 'Salvando... 🔄';
                        clearTimeout(this.saveTimeout);
                        this.saveTimeout = setTimeout(async () => { await this.saveToFirebase(); }, 2000);
                    }
                }
            }
        },
        mounted() {
            if (this.isFirebaseConfigured) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        this.user = user;
                        await this.loadFromFirebase();
                    } else {
                        this.user = null;
                        this.appData = { years: [] };
                        this.isDataLoaded = false;
                    }
                    this.isCheckingAuth = false;
                });
            }
        },
        methods: {
            async handleAuth() {
                try {
                    this.errorMessage = '';
                    if (this.isLoginMode) {
                        await signInWithEmailAndPassword(auth, this.authEmail, this.authPassword);
                    } else {
                        await createUserWithEmailAndPassword(auth, this.authEmail, this.authPassword);
                    }
                    this.authPassword = '';
                } catch (error) {
                    this.errorMessage = error.code === 'auth/invalid-credential' ? 'Email ou senha incorretos.' : (error.code === 'auth/email-already-in-use' ? 'Este email já possui conta.' : error.message);
                }
            },
            async logout() { await signOut(auth); },

            async saveToFirebase() {
                try {
                    const userRef = doc(db, "users", this.user.uid);
                    await setDoc(userRef, { data: JSON.parse(JSON.stringify(this.appData)) });
                    this.syncStatus = 'Salvo na nuvem ☁️';
                } catch (e) {
                    this.errorMessage = "Erro ao sincronizar dados: " + e.message;
                    this.syncStatus = 'Erro ao salvar ❌';
                }
            },

            // Garante que dados antigos recebam as propriedades novas sem bugar
            migrateData(dataObj) {
                if(!dataObj || !dataObj.years) return { years: [] };
                dataObj.years.forEach((y, idx) => {
                    if(y.investments !== undefined && y.categories === undefined) {
                        y.categories = [{ id: 'cat_' + Date.now() + '_' + idx, name: 'Geral', isExpanded: true, investments: y.investments }];
                        delete y.investments;
                    }
                    // Adiciona o controle de expansão se não existir na categoria
                    if(y.categories) {
                        y.categories.forEach(c => {
                            if (c.isExpanded === undefined) c.isExpanded = true;
                        });
                    }
                });
                return dataObj;
            },

            async loadFromFirebase() {
                try {
                    const userRef = doc(db, "users", this.user.uid);
                    const docSnap = await getDoc(userRef);
                    if (docSnap.exists() && docSnap.data().data) {
                        this.appData = this.migrateData(docSnap.data().data);
                    } else {
                        this.appData = { years: [] };
                    }
                    this.$nextTick(() => { this.isDataLoaded = true; });
                } catch (e) {
                    this.errorMessage = "Erro ao carregar dados: " + e.message;
                }
            },

            withLog(fn) {
                return (...args) => {
                    try { this.errorMessage = ''; return fn.apply(this, args); } 
                    catch (error) { this.errorMessage = `ERRO: ${error.message} em [${fn.name}]`; console.error(error); }
                }
            },
            
            formatCurrency(value, currencyCode) {
                const code = currencyCode || 'BRL';
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: code }).format(value || 0);
            },
            getCurrencySymbol(currencyCode) { return currencyCode === 'USD' ? 'US$' : 'R$'; },
            getProfitClass(value) {
                if (value === null || value === 0) return '';
                return value > 0 ? 'text-success' : 'text-danger';
            },

            createNewYear() {
                this.withLog(function createNewYear() {
                    const yearName = prompt("Qual o ano do calendário?", new Date().getFullYear());
                    if (!yearName) return;
                    this.appData.years.push({ year: yearName, categories: [] });
                    this.currentYearIndex = this.appData.years.length - 1;
                    this.currentCategoryIndex = -1;
                    this.currentInvestmentIndex = -1;
                    this.currentView = 'overview';
                })();
            },

            deleteYear(index) {
                this.withLog(function deleteYear() {
                    if(confirm(`Excluir todo o calendário de ${this.appData.years[index].year} e seus dados?`)) {
                        this.appData.years.splice(index, 1);
                        this.currentYearIndex = 0;
                        this.currentCategoryIndex = -1;
                        this.currentInvestmentIndex = -1;
                        this.currentView = 'overview';
                        this.selectedForAnalysis = [];
                    }
                })();
            },

            createNewCategory() {
                this.withLog(function createNewCategory() {
                    const catName = prompt("Digite o nome da categoria (ex: Previdência, Ações, Exterior):");
                    if(!catName) return;
                    this.currentYear.categories.push({
                        id: 'cat_' + Date.now(),
                        name: catName,
                        isExpanded: true,
                        investments: []
                    });
                })();
            },

            deleteCategory(cIdx) {
                this.withLog(function deleteCategory() {
                    if(confirm('Tem certeza que deseja excluir esta categoria e TODOS os ativos dentro dela?')) {
                        this.currentYear.categories.splice(cIdx, 1);
                        this.selectedForAnalysis = this.selectedForAnalysis.filter(val => !val.startsWith(`${cIdx}-`));
                        this.selectedChartInvestments = this.selectedChartInvestments.filter(val => !val.startsWith(`${cIdx}-`));
                        
                        if (this.currentCategoryIndex === cIdx) {
                            this.currentCategoryIndex = -1;
                            this.currentInvestmentIndex = -1;
                            this.currentView = 'overview';
                        }
                    }
                })();
            },

            createNewInvestment(cIdx) {
                this.withLog(function createNewInvestment() {
                    this.currentYear.categories[cIdx].isExpanded = true; // Abre a categoria se estiver fechada
                    this.currentYear.categories[cIdx].investments.push({
                        id: Date.now().toString(),
                        name: 'Novo Ativo',
                        currency: 'BRL',
                        initial: null,
                        months: Array.from({length: 12}, () => ({ contribution: null, balance: null }))
                    });
                    this.currentCategoryIndex = cIdx;
                    this.currentInvestmentIndex = this.currentYear.categories[cIdx].investments.length - 1;
                    this.currentView = 'investment';
                })();
            },

            deleteInvestment(cIdx, iIdx) {
                this.withLog(function deleteInvestment() {
                    if(confirm("Deseja realmente excluir este ativo?")) {
                        this.currentYear.categories[cIdx].investments.splice(iIdx, 1);
                        
                        this.selectedForAnalysis = this.selectedForAnalysis.filter(val => val !== `${cIdx}-${iIdx}`);
                        this.selectedChartInvestments = this.selectedChartInvestments.filter(val => val !== `${cIdx}-${iIdx}`);
                        
                        if (this.currentCategoryIndex === cIdx && this.currentInvestmentIndex === iIdx) {
                            this.currentCategoryIndex = -1;
                            this.currentInvestmentIndex = -1;
                            this.currentView = 'overview';
                        }
                    }
                })();
            },

            clearCurrentInvestmentData() {
                this.withLog(function clearCurrentInvestmentData() {
                    if(confirm("Apagar os valores deste ativo? (O nome e moeda serão mantidos)")) {
                        this.currentInvestment.initial = null;
                        this.currentInvestment.months = Array.from({length: 12}, () => ({ contribution: null, balance: null }));
                    }
                })();
            },

            selectYear(index) { 
                this.currentYearIndex = index; 
                this.currentCategoryIndex = -1;
                this.currentInvestmentIndex = -1;
                this.currentView = 'overview'; 
                this.selectedForAnalysis = []; 
            },
            
            selectInvestment(cIdx, iIdx) { 
                this.currentCategoryIndex = cIdx;
                this.currentInvestmentIndex = iIdx; 
                this.currentView = 'investment'; 
            },

            calcTotalInvested(inv, monthIndex) {
                let total = Number(inv.initial) || 0;
                for (let i = 0; i <= monthIndex; i++) total += Number(inv.months[i].contribution) || 0;
                return total;
            },

            calcProfit(inv, monthIndex) {
                const balance = inv.months[monthIndex].balance;
                if (balance === null || balance === '') return null;
                return Number(balance) - this.calcTotalInvested(inv, monthIndex);
            },

            calcProfitPercent(inv, monthIndex) {
                const balance = inv.months[monthIndex].balance;
                if (balance === null || balance === '') return null;
                const total = this.calcTotalInvested(inv, monthIndex);
                return total === 0 ? 0 : ((Number(balance) / total) - 1) * 100;
            },

            getLastRecordedMonthIndex(inv) {
                for (let i = 11; i >= 0; i--) if (inv.months[i].balance !== null && inv.months[i].balance !== '') return i;
                return -1;
            },

            analyzeSelected() { this.openChart([...this.selectedForAnalysis]); },

            openChart(indices) {
                this.withLog(function openChart() {
                    this.currentView = 'chart';
                    
                    if (indices) {
                        this.selectedChartInvestments = indices;
                    } else {
                        this.selectedChartInvestments = [];
                        this.currentYear.categories.forEach((cat, cIdx) => {
                            cat.investments.forEach((_, iIdx) => {
                                this.selectedChartInvestments.push(`${cIdx}-${iIdx}`);
                            });
                        });
                    }
                    
                    this.$nextTick(() => this.renderChart());
                })();
            },

            renderChart() {
                this.withLog(function renderChart() {
                    const canvas = document.getElementById('investmentChart');
                    if (!canvas) return;
                    if (this.chartInstance) this.chartInstance.destroy();

                    const datasets = this.selectedChartInvestments.map((val, globalIndex) => {
                        const [cIdx, iIdx] = val.split('-');
                        const cat = this.currentYear.categories[cIdx];
                        const inv = cat.investments[iIdx];
                        
                        const color = `hsl(${(globalIndex * 137.5) % 360}, 70%, 50%)`; 
                        return {
                            label: `${cat.name} - ${inv.name || 'Sem Nome'}`,
                            data: inv.months.map(m => (m.balance !== null && m.balance !== '') ? m.balance : null),
                            currency: inv.currency || 'BRL',
                            borderColor: color, backgroundColor: color, tension: 0.2, spanGaps: true
                        };
                    });

                    this.chartInstance = new Chart(canvas, {
                        type: 'line', data: { labels: this.monthNames, datasets },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: { y: { ticks: { callback: v => new Intl.NumberFormat('pt-BR').format(v) } } },
                            plugins: { tooltip: { callbacks: { label: c => `${c.dataset.label}: ${this.formatCurrency(c.raw, c.dataset.currency)}` } } }
                        }
                    });
                })();
            }
        }
    }).mount('#app');
</script>
</body>
</html>
